<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="icon" href="https://lh3.googleusercontent.com/d/1drM76LlU3sdqpwo-Urq7ZULoyORC0UMQ">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#1B7548', primaryDark: '#145c38' }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Poppins', sans-serif; }
        .bg-animated {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: linear-gradient(rgba(20, 40, 28, 0.75), rgba(10, 15, 12, 0.9)), 
                        url('https://lh3.googleusercontent.com/d/1vI4PCquzIBTekytJ0pGo1xKym9qtZIQX?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover; background-position: center;
            animation: zoomBg 25s infinite alternate ease-in-out;
        }
        @keyframes zoomBg { from { transform: scale(1); } to { transform: scale(1.06); } }
        .login-card { background: rgba(16, 42, 10, 0.297); backdrop-filter: blur(0px); }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 overflow-y-auto selection:bg-primary selection:text-white">

    <div class="bg-animated"></div>

    <div class="absolute top-4 left-4 sm:top-6 sm:left-6 z-20">
        <a href="index.html" class="flex items-center gap-2 text-white/90 text-sm font-semibold hover:text-white bg-black/20 hover:bg-black/40 px-4 py-2 rounded-xl border border-white/10 transition-all duration-200">
            <i class="fas fa-arrow-left text-xs"></i> <span>Kembali</span>
        </a>
    </div>

    <div class="w-full max-w-md my-auto py-8 flex flex-col items-center">
        <div class="text-center mb-6 relative z-10 w-full px-4">
            <img src="https://lh3.googleusercontent.com/d/1drM76LlU3sdqpwo-Urq7ZULoyORC0UMQ" alt="Logo" class="h-24 w-auto object-contain mx-auto mb-4 drop-shadow-xl">
            <h1 class="text-xl sm:text-2xl font-bold text-white tracking-wider block">Sistem Login</h1>
            <p class="text-emerald-400/90 text-xs sm:text-sm font-medium mt-1 tracking-wide">Sistem Informasi Digital Panel Peserta</p>
        </div>

        <div class="w-full login-card p-6 sm:p-8 rounded-2xl shadow-2xl shadow-black/50 border border-white/40 relative z-10 transition-all duration-300">
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-[11px] font-bold text-slate-500  tracking-widest mb-2 ml-1">Email</label>
                    <div class="relative group">
                        <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors text-sm"></i>
                        <input type="text" id="username" required placeholder="contoh@gmail.com"
                            class="w-full pl-11 pr-4 py-3.5 bg-slate-50 rounded-xl border border-slate-200 focus:border-primary focus:bg-white focus:ring-4 focus:ring-primary/10 outline-none transition-all text-sm text-slate-800 placeholder:text-slate-400 font-medium">
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-slate-500  tracking-widest mb-2 ml-1">Password</label>
                    <div class="relative group">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors text-sm"></i>
                        <input type="password" id="password" required placeholder="••••••••"
                            class="w-full pl-11 pr-11 py-3.5 bg-slate-50 rounded-xl border border-slate-200 focus:border-primary focus:bg-white focus:ring-4 focus:ring-primary/10 outline-none transition-all text-sm text-slate-800 placeholder:text-slate-400 font-mono">
                        <button type="button" id="togglePassword" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors cursor-pointer p-1">
                            <i class="fas fa-eye-slash text-sm"></i>
                        </button>
                    </div>
                </div>

                <div id="error-message" class="hidden flex items-start gap-2.5 text-red-700 bg-red-50/90 px-4 py-3 rounded-xl text-xs font-semibold border border-red-200/60 leading-relaxed shadow-sm animate-fadeIn">
                    <i class="fas fa-circle-exclamation mt-0.5 text-sm"></i>
                    <span id="error-text">Username atau Password salah!</span>
                </div>
<!-- Link Pendaftaran -->
<div class="text-center text-xs text-slate-500 font-medium mt-5 pt-1">
    Belum Punya Akun? <a href="daftar_peserta.html" class="text-primary hover:text-primaryDark font-bold hover:underline transition-colors">Daftar Disini</a>
</div>
                <button type="submit" id="btnSubmit" class="w-full bg-primary hover:bg-primaryDark text-white font-bold py-4 rounded-xl shadow-md hover:shadow-xl transition-all duration-200 transform active:scale-[0.99] flex items-center justify-center gap-2 cursor-pointer text-sm tracking-wider">
                    <span>MASUK</span>
                    <i class="fas fa-sign-in-alt text-xs"></i>
                </button>
            </form>
        </div>
    </div>

<script>
// URL Web App Google Apps Script Anda (Gunakan URL Deployment Aktif Anda)
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxUL7aoHX4WWO87mzGKTDB1jZW9g5csu5p0guJvj7sRLeLUqHoj-n69nR8PwARs1x4B/exec";

// Toggle Visibility Password
const toggleBtn = document.getElementById('togglePassword');
const passInput = document.getElementById('password');
toggleBtn.onclick = () => {
    const isPass = passInput.type === 'password';
    passInput.type = isPass ? 'text' : 'password';
    toggleBtn.querySelector('i').classList.toggle('fa-eye-slash');
    toggleBtn.querySelector('i').classList.toggle('fa-eye');
};

// Cek Login Admin Langsung (Hardcoded)
async function checkAdminLogin(userInp, passInp) {
    // Kredensial Admin
    const adminUser = "admin";
    const adminPass = "123";

    if (userInp === adminUser && passInp === adminPass) {
        return true;
    }
    return false;
}

// Handler Submit Form Login
document.getElementById('loginForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnSubmit');
    const errorDiv = document.getElementById('error-message');
    const errorText = document.getElementById('error-text');
    
    const userInp = document.getElementById('username').value.trim(); 
    const passInp = document.getElementById('password').value.trim(); 

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memeriksa Akun...';
    errorDiv.classList.add('hidden');

    // 1. Jalankan Proteksi Awal: Cek Login Admin
    if (await checkAdminLogin(userInp, passInp)) {
        // Set sesi admin agar halaman admin.html bisa diakses
        sessionStorage.setItem('isAdminLoggedIn', 'true');
        window.location.href = "admin.html";
        return;
    }

    // 2. LOGIKAL BARU: Validasi Akun Peserta Langsung Ke Google Sheets via Apps Script
    try {
        const response = await fetch(SCRIPT_URL);
        if (!response.ok) throw new Error("Gagal terhubung ke server pendaftaran.");

        const result = await response.json();
        
        if (result.status === "success" && result.data) {
            // Mencari baris data yang Kolom C (Email/Username) dan Kolom D (Password)-nya cocok
            const akunDitemukan = result.data.find(row => 
                (String(row.email).toLowerCase().trim() === userInp.toLowerCase() || 
                 String(row.nama).toLowerCase().trim() === userInp.toLowerCase()) && 
                String(row.password).trim() === passInp
            );

            if (akunDitemukan) {
                // Berhasil Login! Ambil seluruh baris biodatanya untuk sesi dashboard panelpeserta.html
                localStorage.setItem('sesiPeserta', JSON.stringify(akunDitemukan));
                
                // Beri efek loading sukses sebentar sebelum redirect
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Berhasil Masuk!';
                btn.classList.replace('bg-primary', 'bg-emerald-600');
                
                setTimeout(() => {
                    window.location.href = "panelpeserta.html";
                }, 800);
            } else {
                throw new Error("Username/Email atau Password Anda salah.");
            }
        } else {
            throw new Error("Format database dari Google Sheets tidak dikenali.");
        }

    } catch (err) {
        // Tampilkan pesan error secara dinamis ke form
        errorDiv.classList.remove('hidden');
        errorText.innerText = err.message;
        btn.disabled = false;
        btn.innerHTML = '<span>MASUK</span><i class="fas fa-sign-in-alt text-sm"></i>';
    }
};
</script>
</body>
</html>
