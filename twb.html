<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Twibbon | PSNU PAGARNUSA UNUSIA</title>
    <link rel="icon" href="https://lh3.googleusercontent.com/d/1s9Jk23CD-l8l8WfScd93sqIsJLx2OrYB">
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#1B7548', accent: '#0f172a' },
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent; 
        }
        .clean-card { 
            background: #ffffff; 
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        }
        .canvas-container { 
            position: relative; width: 100%; max-width: 400px; aspect-ratio: 1/1; 
            margin: 0 auto; border-radius: 0.75rem; overflow: hidden; touch-action: none;
            background: #f1f5f9; border: 1px solid #cbd5e1;
        }
        canvas { width: 100% !important; height: auto !important; display: block; }
        .step-locked { opacity: 0.4; pointer-events: none; filter: grayscale(1); transition: all 0.3s ease; }
        .step-unlocked { opacity: 1; pointer-events: auto; filter: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col select-none" oncontextmenu="return false;">

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-sm py-3 px-5 border-b border-slate-200">
        <div class="max-w-xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="logopn.png" alt="Logo" class="h-8" onerror="this.src='https://via.placeholder.com/50x50?text=PN'">
                <div>
                    <h1 class="text-sm font-bold text-slate-800 leading-tight">PSNU Pagar Nusa Unusia</h1>
                    <p class="text-[10px] text-slate-500 font-medium">Pelantikan, Diklat & Wisuda</p>
                </div>
            </div>
            <button onclick="window.location.reload()" class="w-8 h-8 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center hover:bg-slate-200 active:bg-slate-300 transition-colors">
                <i class="fas fa-rotate-right text-xs"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 max-w-xl mx-auto w-full px-5 py-8 space-y-8 pb-20">
        
        <section data-aos="fade-up">
            <div class="flex items-center gap-3 mb-4">
                <span class="w-7 h-7 rounded-full bg-primary text-white flex items-center justify-center font-semibold text-sm">1</span>
                <h2 class="font-semibold text-slate-800 text-base">Atur Foto</h2>
            </div>
            <div class="clean-card rounded-xl p-5 space-y-5">
                <div class="canvas-container" id="containerCanvas">
                    <canvas id="twibbonCanvas" width="1080" height="1080"></canvas>
                </div>
                <div class="grid grid-cols-4 gap-3">
                    <label class="col-span-4 flex items-center justify-center gap-2 bg-primary hover:bg-[#155b38] text-white py-3 rounded-lg font-medium text-sm cursor-pointer transition-colors">
                        <i class="fas fa-camera"></i> Pilih Foto
                        <input type="file" id="inputFoto" accept="image/*" class="hidden">
                    </label>
                    <button onclick="changeZoom(1.1)" class="bg-slate-50 border border-slate-200 h-11 rounded-lg text-slate-600 hover:bg-slate-100 active:bg-slate-200 transition-colors"><i class="fas fa-plus"></i></button>
                    <button onclick="changeZoom(0.9)" class="bg-slate-50 border border-slate-200 h-11 rounded-lg text-slate-600 hover:bg-slate-100 active:bg-slate-200 transition-colors"><i class="fas fa-minus"></i></button>
                    <button onclick="rotateImg()" class="bg-slate-50 border border-slate-200 h-11 rounded-lg text-slate-600 hover:bg-slate-100 active:bg-slate-200 transition-colors"><i class="fas fa-sync-alt"></i></button>
                    <button onclick="resetTransform()" class="bg-red-50 border border-red-100 h-11 rounded-lg text-red-500 hover:bg-red-100 active:bg-red-200 transition-colors"><i class="fas fa-trash-can"></i></button>
                </div>
            </div>
        </section>

        <section id="sectionNama" class="step-locked" data-aos="fade-up">
            <div class="flex items-center gap-3 mb-4">
                <span class="w-7 h-7 rounded-full bg-primary text-white flex items-center justify-center font-semibold text-sm">2</span>
                <h2 class="font-semibold text-slate-800 text-base">Masukkan Nama</h2>
            </div>
            <div class="clean-card rounded-xl p-5">
                <input type="text" id="inputNama" oninput="checkFlow()" placeholder="Ketik nama lengkap Anda..." 
                    class="w-full px-4 py-3 rounded-lg bg-slate-50 border border-slate-300 focus:border-primary focus:ring-1 focus:ring-primary outline-none text-sm text-slate-700 transition-all">
            </div>
        </section>

        <section id="sectionCopy" class="step-locked" data-aos="fade-up">
            <div class="flex items-center gap-3 mb-4">
                <span class="w-7 h-7 rounded-full bg-primary text-white flex items-center justify-center font-semibold text-sm">3</span>
                <h2 class="font-semibold text-slate-800 text-base">Salin Caption</h2>
            </div>
            <div class="clean-card rounded-xl p-5 space-y-4">
                <div id="previewText" class="p-4 bg-slate-50 rounded-lg text-xs text-slate-600 leading-relaxed border border-slate-200 whitespace-pre-line font-mono">
                    Lengkapi langkah 1 & 2 untuk melihat caption...
                </div>
                <button onclick="copyCaption()" class="w-full bg-slate-800 hover:bg-slate-900 text-white py-3 rounded-lg font-medium text-sm flex items-center justify-center gap-2 transition-colors">
                    <i class="fas fa-copy"></i>
                    <span id="btnCopyText">Salin Teks</span>
                </button>
            </div>
        </section>

        <section id="sectionDownload" class="step-locked" data-aos="fade-up">
            <div class="flex items-center gap-3 mb-4">
                <span class="w-7 h-7 rounded-full bg-primary text-white flex items-center justify-center font-semibold text-sm">4</span>
                <h2 class="font-semibold text-slate-800 text-base">Unduh Hasil</h2>
            </div>
            <button onclick="downloadTwibbon()" class="w-full bg-primary hover:bg-[#155b38] text-white py-4 rounded-xl font-semibold shadow-sm flex items-center justify-center gap-2 transition-colors">
                <i class="fas fa-download"></i>
                <span>Simpan ke Galeri</span>
            </button>
        </section>
    </main>

    <footer class="py-8 text-center">
        <p class="text-[11px] font-medium text-slate-400">© 2026 PSNU Pagar Nusa Unusia</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 600, once: true });

        const canvas = document.getElementById('twibbonCanvas');
        const ctx = canvas.getContext('2d');
        
        const frameImg = new Image();
        frameImg.crossOrigin = "anonymous";
        frameImg.src = 'https://lh3.googleusercontent.com/d/1s9Jk23CD-l8l8WfScd93sqIsJLx2OrYB'; // Ganti dengan path gambar template Anda

        let userImg = new Image();
        let imgLoaded = false;
        let frameLoaded = false;
        let scale = 1, posX = 540, posY = 540, rotation = 0;

        frameImg.onload = () => {
            frameLoaded = true;
            draw();
        };

        frameImg.onerror = () => {
            console.error("File template.png tidak ditemukan!");
            ctx.fillStyle = "#1B7548";
            ctx.fillRect(0, 0, 1080, 1080);
            ctx.fillStyle = "white";
            ctx.font = "bold 40px Arial";
            ctx.textAlign = "center";
            ctx.fillText("File template.png tidak ditemukan", 540, 540);
        };

        document.getElementById('inputFoto').onchange = (e) => {
            if (!e.target.files[0]) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                userImg.onload = () => {
                    imgLoaded = true;
                    document.getElementById('sectionNama').classList.replace('step-locked', 'step-unlocked');
                    resetTransform();
                    checkFlow();
                };
                userImg.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function checkFlow() {
            const nama = document.getElementById('inputNama').value.trim();
            const isValid = imgLoaded && nama.length >= 3;
            
            ['sectionDownload', 'sectionCopy'].forEach(id => {
                const el = document.getElementById(id);
                if (isValid) {
                    el.classList.replace('step-locked', 'step-unlocked');
                } else {
                    el.classList.replace('step-unlocked', 'step-locked');
                }
            });

            if (isValid) updateCaptionPreview(nama);
        }

        function updateCaptionPreview(nama) {
            const caption = `Lahir untuk Mengabdi, Berdiri untuk Membela. 🦅💚\n\nSaya ${nama.toUpperCase()}, siap menyukseskan dan mengikuti seluruh rangkaian HARLAH & UKT PSNU PAGARNUSA IV. Dengan semangat 'Laa Ghaliba Illa Billah', saya siap merapatkan barisan di bawah naungan Nahdlatul Ulama.\nNKRI Harga Mati, Pagar Nusa Sampai Mati!\n\n@pagarnusaunusia @unuindonesia @ukm.pencaksilatunusia @pagarnusaindonesia @pagarnusa.or.id\n#PagarNusa #PagarNusaIndonesia #UKTPagarNusa2026 #NahdlatulUlama #SantriPagarNusa #LaaGhalibaIllaBillah`;
            document.getElementById('previewText').innerText = caption;
        }

        function draw() {
            ctx.clearRect(0, 0, 1080, 1080);
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, 1080, 1080);
            
            if (imgLoaded) {
                ctx.save();
                ctx.translate(posX, posY);
                ctx.rotate(rotation * Math.PI / 180);
                ctx.drawImage(userImg, -(userImg.width * scale) / 2, -(userImg.height * scale) / 2, userImg.width * scale, userImg.height * scale);
                ctx.restore();
            }
            
            if (frameLoaded) {
                ctx.drawImage(frameImg, 0, 0, 1080, 1080);
            }
        }

        function changeZoom(factor) { if (imgLoaded) { scale *= factor; draw(); } }
        function rotateImg() { if (imgLoaded) { rotation += 90; draw(); } }
        function resetTransform() {
            if (!imgLoaded) return;
            scale = Math.max(1080 / userImg.width, 1080 / userImg.height);
            posX = 540; posY = 540; rotation = 0;
            draw();
        }

        const mc = new Hammer.Manager(canvas);
        mc.add(new Hammer.Pinch());
        mc.add(new Hammer.Pan());

        let lastScale = 1;
        mc.on("pinchstart", () => { lastScale = scale; });
        mc.on("pinchmove", (e) => { scale = lastScale * e.scale; draw(); });

        let lastPosX, lastPosY;
        mc.on("panstart", () => { lastPosX = posX; lastPosY = posY; });
        mc.on("panmove", (e) => {
            const rect = canvas.getBoundingClientRect();
            const ratio = 1080 / rect.width;
            posX = lastPosX + (e.deltaX * ratio);
            posY = lastPosY + (e.deltaY * ratio);
            draw();
        });

        function downloadTwibbon() {
            const nama = document.getElementById('inputNama').value.trim().toUpperCase() || 'PAGAR_NUSA';
            const link = document.createElement('a');
            link.download = `Twibbon_PN_${nama}.png`;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        }

        async function copyCaption() {
            const caption = document.getElementById('previewText').innerText;
            const btnText = document.getElementById('btnCopyText');
            try {
                await navigator.clipboard.writeText(caption);
                btnText.innerText = "Berhasil Disalin!";
                setTimeout(() => { btnText.innerText = "Salin Teks"; }, 2000);
            } catch (err) {
                alert("Gagal menyalin. Silakan tekan lama teks di atas untuk menyalin manual.");
            }
        }
    </script>
</body>
</html>
