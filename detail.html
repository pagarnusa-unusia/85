<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memuat Berita... - PAC PSNU PAGARNUSA KEMANG</title>
    
    <meta property="og:title" id="og-title" content="Pagar Nusa Kemang">
    <meta property="og:description" id="og-description" content="Media Resmi PAC PSNU PAGARNUSA Kecamatan Kemang - Kabupaten Bogor.">
    <meta property="og:image" id="og-image" content="https://via.placeholder.com/800x600?text=Pagar+Nusa">
    <meta property="og:url" id="og-url" content="">
    <meta property="og:type" content="article">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pn-green-dark: #0f2e22;
            --pn-green: #1b4d3e;
            --pn-green-light: #2c6e59;
            --pn-gold: #d4af37;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; color: #1e293b; background-color: #f8fafc; }
        .nav-font { font-family: 'Oswald', sans-serif; }
        .bg-pn { background-color: var(--pn-green); }
        .text-pn { color: var(--pn-green); }
        .border-pn { border-color: var(--pn-green); }
        
        #scroll-progress { position: fixed; top: 0; left: 0; height: 4px; background: var(--pn-gold); z-index: 100; width: 0%; transition: width 0.1s; }
        
        .dropcap::first-letter {
            float: left;
            font-family: 'Oswald', sans-serif;
            font-size: 4rem;
            line-height: 3.5rem;
            padding-right: 0.75rem;
            font-weight: 700;
            color: var(--pn-green);
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="scroll-progress"></div>

    <header class="bg-white/90 backdrop-blur-md py-4 sticky top-0 z-[60] shadow-sm border-b border-slate-100">
        <div class="container mx-auto px-4 md:px-6 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-3.5 group">
                <img src="https://lh3.googleusercontent.com/d/1drM76LlU3sdqpwo-Urq7ZULoyORC0UMQ" alt="Logo" class="h-10 md:h-12 w-auto object-contain">
                <span class="nav-font font-bold text-pn uppercase text-lg md:text-xl tracking-tight">Pagar Nusa Kemang</span>
            </a>
            <a href="index.html" class="text-pn font-bold text-xs border border-pn px-5 py-2 rounded-xl hover:bg-pn hover:text-white transition duration-300 uppercase tracking-widest">
                Beranda
            </a>
        </div>
    </header>

    <article class="container mx-auto px-4 md:px-6 max-w-4xl py-12">
        <nav class="flex text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-6">
            <a href="index.html" class="hover:text-pn">Beranda</a>
            <span class="mx-2">/</span>
            <span id="breadcrumb-cat" class="text-pn">Kategori</span>
        </nav>

        <div id="loader" class="space-y-6 animate-pulse">
            <div class="h-6 w-24 bg-slate-200 rounded"></div>
            <div class="h-12 w-3/4 bg-slate-200 rounded"></div>
            <div class="h-[400px] w-full bg-slate-200 rounded-2xl"></div>
        </div>

        <div id="content" class="hidden">
            <span id="det-cat" class="bg-emerald-50 text-pn px-3 py-1 text-[10px] font-bold uppercase tracking-[0.2em] rounded-md shadow-sm"></span>
            <h1 id="det-title" class="text-3xl md:text-5xl font-bold mt-4 nav-font text-slate-800 leading-[1.1] tracking-tight uppercase"></h1>
            
            <div class="flex items-center justify-between mt-8 border-b border-slate-200 pb-8">
                <div class="flex items-center space-x-4">
                    <div class="w-10 h-10 bg-pn text-white rounded-full flex items-center justify-center font-bold text-xs nav-font">PN</div>
                    <div>
                        <p id="det-date" class="text-slate-500 text-[10px] font-bold uppercase tracking-widest"></p>
                        <p class="text-pn text-[10px] font-bold mt-0.5 uppercase">Admin PAC Kemang</p>
                    </div>
                </div>
                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">
                    <span id="read-time">0</span> Menit Baca
                </div>
            </div>
            
            <img id="det-img" src="" class="w-full h-auto max-h-[500px] object-cover my-8 rounded-2xl shadow-xl border border-slate-100">
            
            <div id="det-text" class="text-slate-700 leading-relaxed text-lg space-y-6 text-justify"></div>
            
            <div class="mt-20 border-t border-slate-200 pt-12 text-center">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-6">Bagikan Konten Ini</p>
                <div class="flex flex-wrap justify-center gap-3">
                    <button onclick="shareTo('facebook')" class="bg-[#1877F2] text-white px-6 py-2.5 text-[10px] font-bold rounded-xl uppercase tracking-widest hover:opacity-90 transition">Facebook</button>
                    <button onclick="shareTo('twitter')" class="bg-[#1DA1F2] text-white px-6 py-2.5 text-[10px] font-bold rounded-xl uppercase tracking-widest hover:opacity-90 transition">Twitter</button>
                    <button onclick="shareTo('whatsapp')" class="bg-[#25D366] text-white px-6 py-2.5 text-[10px] font-bold rounded-xl uppercase tracking-widest hover:opacity-90 transition">WhatsApp</button>
                </div>
            </div>

            <div class="mt-20">
                <h3 class="nav-font text-xl font-bold text-slate-800 border-l-4 border-pn pl-4 mb-8 uppercase">Berita Terkait</h3>
                <div id="related-posts" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>
        </div>
    </article>

    <footer class="bg-white border-t border-slate-100 py-12 mt-24 text-center">
        <p class="text-[10px] text-slate-400 uppercase tracking-[0.3em] font-bold">© 2026 PAC PSNU PAGARNUSA KECAMATAN KEMANG</p>
    </footer>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxrjbI6ZzqcX4zurydbnqAo8GvNdsKzQ0nODvelWFJlPJGAjaUPw7u64CdMNaoZTvZ-/exec';
        let currentArticle = null;

        window.onscroll = () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            document.getElementById("scroll-progress").style.width = (winScroll / height) * 100 + "%";
        };

        async function loadDetail() {
            const id = new URLSearchParams(window.location.search).get('id');
            if (!id) { window.location.href = 'index.html'; return; }

            try {
                const response = await fetch(API_URL);
                const res = await response.json();
                currentArticle = res.berita.find(x => x.id == id);
                if (!currentArticle) throw new Error("Not Found");

                // Update UI
                document.title = currentArticle.judul + " | PAC Pagar Nusa Kemang";
                document.getElementById('det-title').innerText = currentArticle.judul;
                document.getElementById('det-cat').innerText = currentArticle.kategori;
                document.getElementById('breadcrumb-cat').innerText = currentArticle.kategori;
                document.getElementById('det-date').innerText = currentArticle.tanggal;
                document.getElementById('det-img').src = currentArticle.gambar;

                const paragraphs = currentArticle.isi.split('\n').filter(t => t.trim() !== '');
                document.getElementById('det-text').innerHTML = paragraphs.map((p, i) => 
                    `<p class="${i === 0 ? 'dropcap' : ''}">${p.trim()}</p>`).join('');

                document.getElementById('read-time').innerText = Math.ceil(currentArticle.isi.split(/\s+/).length / 200);
                
                // Related
                const container = document.getElementById('related-posts');
                res.berita.filter(n => n.kategori === currentArticle.kategori && n.id != id).slice(0,2).forEach(item => {
                    container.innerHTML += `<a href="detail.html?id=${item.id}" class="block bg-white p-6 rounded-2xl border border-slate-100 hover:border-pn transition">
                        <span class="text-[9px] font-bold text-pn uppercase tracking-widest">${item.kategori}</span>
                        <h4 class="font-bold text-slate-800 mt-2 line-clamp-2">${item.judul}</h4>
                    </a>`;
                });

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
            } catch (e) {
                document.getElementById('loader').innerHTML = `<div class='text-center py-20 font-bold'>Berita tidak ditemukan. <a href='index.html' class='text-pn'>Kembali</a></div>`;
            }
        }

        function shareTo(p) {
            const url = window.location.href;
            const text = currentArticle.judul;
            const urls = {
                facebook: `https://www.facebook.com/sharer/sharer.php?u=${url}`,
                twitter: `https://twitter.com/intent/tweet?text=${text}&url=${url}`,
                whatsapp: `https://api.whatsapp.com/send?text=${text} - ${url}`
            };
            window.open(urls[p], '_blank');
        }

        window.onload = loadDetail;
    </script>
</body>
</html>
