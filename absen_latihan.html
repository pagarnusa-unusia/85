<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>E-Absensi | PSNU PAGARNUSA UNUSIA</title>
    <link rel="icon" type="image/png" href="logopn.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --primary: #10b981; 
            --bg-dark: #090d16;
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-dark);
            color: #f8fafc; 
            min-height: 100vh;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* Latar Belakang Sinematik yang Diperhalus untuk HP */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-image: linear-gradient(to bottom, rgba(9, 13, 22, 0.85), rgba(9, 13, 22, 0.95)), 
                              url('https://lh3.googleusercontent.com/d/1vI4PCquzIBTekytJ0pGo1xKym9qtZIQX?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Glassmorphism Premium */
        .glass { 
            background: rgba(22, 32, 54, 0.45); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06); 
        }

        .page { 
            display: none; 
            width: 100%; 
            max-width: 540px; 
            margin: 0 auto;
            padding: 1.25rem;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
        }

        .page.active { display: block; }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(16px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* State Seleksi Kartu Santri */
        .check-card input:checked + .card-content { 
            background: rgba(16, 185, 129, 0.12); 
            border-color: rgba(16, 185, 129, 0.4); 
            box-shadow: 0 8px 24px -6px rgba(16, 185, 129, 0.2);
        }

        .check-card input:checked + .card-content .check-box { 
            background: var(--primary); 
            border-color: var(--primary); 
            color: white;
            transform: scale(1.05);
        }

        .check-card input:checked + .card-content .avatar {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(16, 185, 129, 0.1);
        }

        /* Animasi Loading Shimmer */
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.04) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .header-gradient {
            background: linear-gradient(to bottom, var(--bg-dark) 85%, transparent);
        }

        .nav-blur {
            background: rgba(9, 13, 22, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-item {
            transition: all 0.25s ease;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item.active i {
            transform: translateY(-2px);
            text-shadow: 0 0 12px rgba(16, 185, 129, 0.5);
        }
    </style>
</head>

<body class="flex flex-col items-center justify-start min-h-screen px-2 sm:px-4">

    <!-- PAGE 1: PILIH KAMPUS -->
    <div id="page-kampus" class="page active">
        <div class="text-center mt-12 mb-10">
            <div class="inline-block p-4 rounded-[2.5rem] bg-emerald-500/10 mb-5 shadow-inner">
                <img src="logopn.png" alt="Logo" class="w-24 h-24 mx-auto drop-shadow-[0_10px_15px_rgba(16,185,129,0.3)] animate-pulse">
            </div>
            <h1 class="text-3xl font-extrabold text-white tracking-tight">PAGAR NUSA</h1>
            <p class="text-emerald-400 font-bold text-xs tracking-[0.3em] uppercase mt-1.5 opacity-90">Sistem Absensi Terpadu</p>
        </div>

        <div class="space-y-4">
            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest ml-1 opacity-70">Pilih Lokasi Latihan</p>

            <button onclick="navToPelet('Jakarta')" class="w-full glass p-5 rounded-2xl flex items-center gap-4 transition-all active:scale-[0.98] hover:bg-white/5 shadow-lg">
                <div class="w-12 h-12 rounded-xl bg-emerald-500/10 flex items-center justify-center overflow-hidden shrink-0">
                    <img src="icona.png" onerror="this.src='https://img.icons8.com/color/48/monument.png'" alt="Jakarta" class="w-9 h-9 object-contain">
                </div>
                <div class="text-left flex-1">
                    <h3 class="font-bold text-white uppercase text-base tracking-wide">KAMPUS JAKARTA</h3>
                    <p class="text-xs text-slate-400 font-medium opacity-80">Rooftop UNUSIA Jakarta</p>
                </div>
                <i class="fas fa-chevron-right text-slate-500 text-xs mr-1"></i>
            </button>

            <button onclick="navToPelet('Bogor')" class="w-full glass p-5 rounded-2xl flex items-center gap-4 transition-all active:scale-[0.98] hover:bg-white/5 shadow-lg">
                <div class="w-12 h-12 rounded-xl bg-sky-500/10 flex items-center justify-center overflow-hidden shrink-0">
                    <img src="iconb.png" onerror="this.src='https://img.icons8.com/color/48/sword.png'" alt="Bogor" class="w-9 h-9 object-contain">
                </div>
                <div class="text-left flex-1">
                    <h3 class="font-bold text-white uppercase text-base tracking-wide">KAMPUS BOGOR</h3>
                    <p class="text-xs text-slate-400 font-medium opacity-80">GOR UNUSIA Bogor</p>
                </div>
                <i class="fas fa-chevron-right text-slate-500 text-xs mr-1"></i>
            </button>
        </div>
        <div class="h-32"></div>
    </div>

    <!-- PAGE 2: PILIH TINGKAT/PELET -->
    <div id="page-pelet" class="page">
        <div class="flex items-center gap-4 mb-8 mt-4">
            <button onclick="showPage('page-kampus')" class="w-11 h-11 glass rounded-xl flex items-center justify-center text-slate-300 active:scale-90 transition-transform">
                <i class="fas fa-arrow-left text-sm"></i>
            </button>
            <div>
                <p class="text-[10px] text-emerald-400 font-extrabold tracking-widest uppercase">LOKASI LATIHAN</p>
                <h2 id="display-kampus" class="text-2xl font-extrabold text-white tracking-tight uppercase">Kampus</h2>
            </div>
        </div>
        <div id="pelet-list" class="space-y-8 pb-32"></div>
    </div>

    <!-- PAGE 3: DAFTAR SANTRI -->
    <div id="page-daftar" class="page">
        <div class="sticky top-0 z-50 header-gradient pt-4 pb-4">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-3">
                    <button onclick="showPage('page-pelet')" class="w-11 h-11 glass rounded-xl flex items-center justify-center text-slate-300 active:scale-90 transition-transform">
                        <i class="fas fa-arrow-left text-sm"></i>
                    </button>
                    <div>
                        <span id="display-info" class="block text-[10px] font-black text-emerald-400 uppercase tracking-[0.15em] mb-0.5">Memuat...</span>
                        <h2 class="text-white text-xl font-bold tracking-tight">Daftar Santri</h2>
                    </div>
                </div>
                <div class="text-right">
                    <div class="flex items-center gap-2 bg-emerald-500/10 px-4 py-2 rounded-xl border border-emerald-500/20 shadow-sm">
                        <span class="text-sm font-black text-emerald-400" id="check-count">0</span>
                        <span class="text-[10px] font-bold text-emerald-400/80 uppercase tracking-wider">Hadir</span>
                    </div>
                </div>
            </div>

            <div class="relative group">
                <input type="text" id="search-input" onkeyup="filterSantri()" placeholder="Cari nama santri..." 
                    class="w-full bg-slate-900/80 border border-white/10 pl-11 pr-28 py-3.5 rounded-xl text-white text-sm outline-none focus:border-emerald-500/50 focus:ring-2 focus:ring-emerald-500/10 transition-all shadow-inner">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm transition-colors group-focus-within:text-emerald-500"></i>
                <button onclick="toggleSelectAll()" class="absolute right-2 top-1/2 -translate-y-1/2 text-[10px] font-extrabold text-emerald-400 bg-emerald-500/10 hover:bg-emerald-500/20 px-3 py-2 rounded-lg transition-colors uppercase tracking-wider border border-emerald-500/20">
                    Hadir Semua
                </button>
            </div>
        </div>

        <!-- Skeleton Loading Animasi -->
        <div id="loading" class="hidden space-y-3 mt-4">
            <div class="h-16 w-full glass rounded-xl shimmer"></div>
            <div class="h-16 w-full glass rounded-xl shimmer"></div>
            <div class="h-16 w-full glass rounded-xl shimmer"></div>
        </div>

        <div id="santri-grid" class="grid grid-cols-1 gap-2.5 mt-4 pb-60"></div>

        <!-- Tombol Simpan Mengambang Modern -->
        <div class="fixed bottom-[96px] left-0 right-0 flex justify-center px-6 z-[60]">
            <button id="btn-submit" onclick="confirmSubmit()" 
                class="w-full max-w-[400px] py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-xl shadow-[0_12px_30px_rgba(16,185,129,0.3)] transition-all active:scale-[0.97] flex items-center justify-center gap-3 border border-white/10">
                <span id="btn-text" class="text-sm tracking-[0.15em] font-black uppercase">SIMPAN ABSENSI</span>
                <i class="fas fa-paper-plane text-xs opacity-80"></i>
            </button>
        </div>
    </div>

    <!-- PAGE 4: REKAP KEHADIRAN -->
    <div id="page-rekap" class="page">
        <div class="mt-6 mb-6 flex justify-between items-end">
            <div>
                <h2 class="text-2xl font-extrabold tracking-tight text-white">Rekap Kehadiran</h2>
                <p class="text-emerald-400 text-[10px] font-bold uppercase tracking-widest mt-1 opacity-90">Total Kehadiran Santri</p>
            </div>
            <button onclick="exportToExcel()" class="bg-emerald-600 hover:bg-emerald-500 text-white w-11 h-11 rounded-xl transition-all active:scale-95 shadow-lg flex items-center justify-center border border-white/10">
                <i class="fas fa-file-excel text-lg"></i>
            </button>
        </div>

        <div class="space-y-3 mb-4">
            <div class="relative">
                <input type="text" id="search-rekap" onkeyup="filterRekap()" placeholder="Cari nama atau pelet..." 
                    class="w-full bg-slate-900/80 border border-white/10 pl-10 pr-4 py-3 rounded-xl text-white text-sm outline-none focus:border-emerald-500/50 transition-all">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
            </div>
        </div>

        <div id="rekap-container" class="space-y-2.5 pb-40"></div>
    </div>

    <!-- BOTTOM NAVBAR (DIDESAIN KHUSUS UNTUK HP) -->
    <nav class="fixed bottom-0 left-0 w-full nav-blur z-[100] px-8 pt-3 pb-6 flex justify-around items-center max-w-[540px] left-1/2 -translate-x-1/2 rounded-t-2xl shadow-2xl">
        <button onclick="showPage('page-kampus')" class="nav-item flex flex-col items-center gap-1 text-slate-400 active" id="nav-absen">
            <div class="w-12 h-8 flex items-center justify-center rounded-xl transition-colors">
                <i class="fas fa-user-check text-xl"></i>
            </div>
            <span class="text-[10px] font-bold uppercase tracking-wider">Absen</span>
        </button>
        <button onclick="loadRekap()" class="nav-item flex flex-col items-center gap-1 text-slate-400" id="nav-rekap">
            <div class="w-12 h-8 flex items-center justify-center rounded-xl transition-colors">
                <i class="fas fa-clipboard-list text-xl"></i>
            </div>
            <span class="text-[10px] font-bold uppercase tracking-wider">Rekap</span>
        </button>
    </nav>

    <script>
        const CONFIG = {
            API: "https://script.google.com/macros/s/AKfycbwa42RDTx_2YlhOVAf_8MOGYxZDHij-I7OvKt0U0IxpdYl3RQsHxCkJRZsb6vLzh9ob/exec",
            MENU: { 
                "Tingkat Muda": ["Putih", "Kuning", "Merah"], 
                "Tingkat Madya": ["Biru", "Coklat", "Hitam"] 
            }
        };

        let state = { kampus: '', tingkat: '', pelet: '', data: [], rekapData: [] };

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(id === 'page-rekap') {
                document.getElementById('nav-rekap').classList.add('active');
            } else {
                document.getElementById('nav-absen').classList.add('active');
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function navToPelet(k) {
            state.kampus = k;
            document.getElementById('display-kampus').innerText = k;
            renderPeletMenu();
            showPage('page-pelet');
        }

        function renderPeletMenu() {
            const container = document.getElementById('pelet-list');
            container.innerHTML = '';
            for (const [tingkat, warnaList] of Object.entries(CONFIG.MENU)) {
                let html = `<div class="space-y-3">
                    <h3 class="text-[11px] font-black text-emerald-400/70 tracking-[0.2em] ml-1 uppercase">${tingkat}</h3>`;
                
                warnaList.forEach(warna => {
                    const colorMap = {
                        'Putih': 'bg-white shadow-[0_0_10px_rgba(255,255,255,0.3)]', 
                        'Kuning': 'bg-amber-400 shadow-[0_0_10px_rgba(251,191,36,0.4)]', 
                        'Merah': 'bg-rose-500 shadow-[0_0_10px_rgba(244,63,94,0.4)]',
                        'Biru': 'bg-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.4)]', 
                        'Coklat': 'bg-amber-800 shadow-[0_0_10px_rgba(146,64,14,0.4)]', 
                        'Hitam': 'bg-slate-950 border border-white/20 shadow-[0_0_10px_rgba(0,0,0,0.8)]'
                    };
                    html += `
                        <button onclick="navToDaftar('${tingkat}', '${warna}')" class="w-full glass p-4 rounded-xl flex items-center justify-between group transition-all active:bg-white/10 shadow-sm">
                            <div class="flex items-center gap-4">
                                <div class="w-2.5 h-7 rounded-full ${colorMap[warna] || 'bg-emerald-500'}"></div>
                                <span class="font-bold text-white text-base tracking-wide">Pelet ${warna}</span>
                            </div>
                            <i class="fas fa-chevron-right text-slate-500 text-xs transition-transform group-hover:translate-x-1"></i>
                        </button>`;
                });
                container.innerHTML += html + `</div>`;
            }
        }

        async function navToDaftar(t, p) {
            state.tingkat = t; state.pelet = p;
            document.getElementById('display-info').innerText = `${t} • ${p}`;
            showPage('page-daftar');
            if(state.data.length === 0) await fetchSantri();
            renderSantri();
        }

        async function fetchSantri() {
            const loading = document.getElementById('loading');
            loading.classList.remove('hidden');
            try {
                const res = await fetch(CONFIG.API);
                state.data = await res.json();
            } catch (e) { alert("Error: Gagal memuat data"); }
            finally { loading.classList.add('hidden'); }
        }

        function renderSantri() {
            const grid = document.getElementById('santri-grid');
            const filtered = state.data.filter(s => s.Kampus === state.kampus && s.Pelet === state.pelet);
            
            if(filtered.length === 0) {
                grid.innerHTML = `<div class="text-center py-20 opacity-40"><i class="fas fa-user-slash text-4xl mb-3 text-slate-500"></i><p class="text-xs font-bold uppercase tracking-widest text-slate-400">Tidak ada data santri</p></div>`;
                return;
            }
            
            grid.innerHTML = filtered.map(s => `
                <label class="check-card cursor-pointer block transition-transform active:scale-[0.99]">
                    <input type="checkbox" value="${s.Nama}" class="hidden" onchange="updateUI()">
                    <div class="card-content glass p-4 rounded-xl border border-transparent transition-all flex items-center justify-between shadow-sm">
                        <div class="flex items-center gap-3.5 overflow-hidden">
                            <div class="avatar w-10 h-10 shrink-0 rounded-lg bg-slate-800/80 border border-white/5 flex items-center justify-center text-xs font-bold text-slate-300 uppercase transition-colors">
                                ${s.Nama.substring(0,2)}
                            </div>
                            <span class="font-semibold text-slate-100 text-sm uppercase truncate tracking-wide">${s.Nama}</span>
                        </div>
                        <div class="check-box w-5.5 h-5.5 shrink-0 rounded-md border border-slate-600 flex items-center justify-center text-[10px] text-transparent transition-all bg-slate-900/40">
                            <i class="fas fa-check"></i>
                        </div>
                    </div>
                </label>`).join('');
            updateUI();
        }

        function filterSantri() {
            const query = document.getElementById('search-input').value.toLowerCase();
            document.querySelectorAll('.check-card').forEach(card => {
                const nama = card.querySelector('span').innerText.toLowerCase();
                // Menggunakan utility classes Tailwind untuk menyembunyikan/menampilkan grid
                if (nama.includes(query)) {
                    card.classList.remove('hidden');
                    card.classList.add('block');
                } else {
                    card.classList.remove('block');
                    card.classList.add('hidden');
                }
            });
        }

        function toggleSelectAll() {
            const checkboxes = document.querySelectorAll('#santri-grid input[type="checkbox"]');
            const visible = Array.from(checkboxes).filter(cb => !cb.closest('.check-card').classList.contains('hidden'));
            const anyUnchecked = visible.some(cb => !cb.checked);
            visible.forEach(cb => cb.checked = anyUnchecked);
            updateUI();
        }

        function updateUI() {
            const count = document.querySelectorAll('#santri-grid input:checked').length;
            document.getElementById('check-count').innerText = count;
        }

        function confirmSubmit() {
            const count = document.querySelectorAll('#santri-grid input:checked').length;
            if(count === 0) return alert("Pilih santri terlebih dahulu!");
            if(confirm(`Simpan kehadiran untuk ${count} santri?`)) submitAbsen();
        }

        async function submitAbsen() {
            const btn = document.getElementById('btn-submit');
            const btnText = document.getElementById('btn-text');
            const hadir = Array.from(document.querySelectorAll('#santri-grid input:checked')).map(cb => cb.value);
            
            btn.disabled = true;
            btn.classList.add('opacity-60');
            btnText.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> MENGAMBIL LOKASI...`;

            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                btnText.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> MENGIRIM DATA...`;

                const payload = {
                    timestamp: new Date().toISOString(),
                    kampus: state.kampus, 
                    pelet: state.pelet, 
                    hadir: hadir.join(", "),
                    lokasi: `${lat},${lon}`
                };

                try {
                    await fetch(CONFIG.API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    alert("Absensi berhasil disimpan!");
                    location.reload();
                } catch (e) {
                    alert("Gagal mengirim data absensi.");
                    resetSubmitButton();
                }
            }, (error) => {
                alert("Gagal mengambil lokasi. Pastikan GPS HP Anda aktif.");
                resetSubmitButton();
            }, { enableHighAccuracy: true });
        }

        function resetSubmitButton() {
            const btn = document.getElementById('btn-submit');
            const btnText = document.getElementById('btn-text');
            btn.disabled = false;
            btn.classList.remove('opacity-60');
            btnText.innerText = "SIMPAN ABSENSI";
        }

        async function loadRekap() {
            showPage('page-rekap');
            const container = document.getElementById('rekap-container');
            container.innerHTML = `<div class="text-center py-16"><i class="fas fa-circle-notch fa-spin text-emerald-500 text-3xl"></i></div>`;
            
            try {
                const res = await fetch(CONFIG.API + "?action=getRekap");
                state.rekapData = await res.json();
                renderRekap(state.rekapData);
            } catch (e) {
                container.innerHTML = `<p class="text-center text-rose-400 text-sm py-12 font-medium">Gagal memuat rekap absensi.</p>`;
            }
        }

        function renderRekap(dataList) {
            const container = document.getElementById('rekap-container');
            if(dataList.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-400 text-sm py-12 opacity-60">Data tidak ditemukan</p>`;
                return;
            }
            container.innerHTML = dataList.map(item => `
                <div class="rekap-card glass p-4 rounded-xl flex items-center justify-between border border-white/5 shadow-sm">
                    <div class="overflow-hidden pr-2">
                        <h4 class="text-white font-bold text-sm truncate uppercase tracking-wide">${item.nama}</h4>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mt-0.5 opacity-80">Pelet ${item.pelet}</p>
                    </div>
                    <div class="text-right shrink-0 bg-slate-900/40 border border-white/5 px-3 py-1.5 rounded-lg min-w-[56px]">
                        <span class="text-emerald-400 font-black text-xl block leading-tight">${item.total}</span>
                        <p class="text-[8px] text-slate-400 font-bold uppercase tracking-wider">Hadir</p>
                    </div>
                </div>`).join('');
        }

        function filterRekap() {
            const query = document.getElementById('search-rekap').value.toLowerCase();
            const filtered = state.rekapData.filter(item => 
                item.nama.toLowerCase().includes(query) || 
                item.pelet.toLowerCase().includes(query)
            );
            renderRekap(filtered);
        }

        function exportToExcel() {
            if (state.rekapData.length === 0) return alert("Tidak ada data untuk diekspor");
            const dataToExport = state.rekapData.map(item => ({
                "Nama Santri": item.nama,
                "Pelet": item.pelet,
                "Total Kehadiran": item.total
            }));
            const worksheet = XLSX.utils.json_to_sheet(dataToExport);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Rekap Absensi");
            XLSX.writeFile(workbook, `Rekap_Absensi_PagarNusa_${new Date().toISOString().split('T')[0]}.xlsx`);
        }
    </script>
</body>
</html>
